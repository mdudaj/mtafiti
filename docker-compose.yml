services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: edmp_test
      POSTGRES_USER: edmp
      POSTGRES_PASSWORD: edmp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edmp -d edmp_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - edmp-postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - edmp-rabbitmq-data:/var/lib/rabbitmq

volumes:
  edmp-postgres-data:
  edmp-rabbitmq-data:
