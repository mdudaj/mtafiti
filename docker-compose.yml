services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mtafiti_test
      POSTGRES_USER: mtafiti
      POSTGRES_PASSWORD: mtafiti
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtafiti -d mtafiti_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mtafiti-postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mtafiti-rabbitmq-data:/var/lib/rabbitmq

volumes:
  mtafiti-postgres-data:
  mtafiti-rabbitmq-data:
