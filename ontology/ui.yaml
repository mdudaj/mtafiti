ontology:
  name: ui
  entities:
    -
      name: ApplicationShell
      contains:
        - AppBar
        - NavigationDrawer
        - ContentArea
        - NotificationSystem
    -
      name: ContentArea
      renders:
        - ListView
        - DetailView
        - FormView
        - DashboardView
        - WorkflowTaskView
    -
      name: PageModel
      fields:
        - route
        - layout_type
        - components
        - actions
        - data_binding
        - workflow_binding
        - permissions
