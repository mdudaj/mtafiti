nodes:
  -
    id: framework:django
    type: Framework
    name: Django
    description: "Model-driven server-side web framework."
    context_hub:
      available: true
      install_command: "npm install -g @aisuite/chub"
      update_command: "chub update"
      help_command: "chub help"
      search_queries:
        - django
        - "django forms"
        - "django urls"
      get_commands:
        - "chub get django/forms"
        - "chub get django/urls"
      status: ready
      local_source_workflow:
        supports_git_url_directly: false
        clone_and_build_steps:
          - "git clone <repo-url> <local-dir>"
          - "chub build <content-dir> -o <content-dir>/dist"
          - "Add `<content-dir>/dist` as `sources[].path` in ~/.chub/config.yaml"
          - "Run `chub update` to refresh configured sources"
      search_results:
        -
          query: django
          total: 1
          matches:
            -
              id: knowledge-src/django-material
              source: maintainer
              description: "Local knowledge source generated from the django-material repository README."
          status: matched
        -
          query: "django forms"
          total: 1
          matches:
            -
              id: knowledge-src/django-material
              source: maintainer
              description: "Local knowledge source generated from the django-material repository README."
          status: matched
        -
          query: "django urls"
          total: 1
          matches:
            -
              id: knowledge-src/django-material
              source: maintainer
              description: "Local knowledge source generated from the django-material repository README."
          status: matched
      search_status: matched
      candidate_registry_ids:
        - knowledge-src/django-material
    repository_fit:
      status: installed
      evidence:
        - backend/requirements.txt
        - backend/config/settings.py
        - backend/config/urls.py
      repository_patterns:
        - "Function-based JsonResponse APIs in core.views"
        - "Django model layer in core.models"
        - "Middleware-driven request instrumentation and auth"
