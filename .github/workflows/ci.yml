name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: edmp_test
          POSTGRES_USER: edmp
          POSTGRES_PASSWORD: edmp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U edmp -d edmp_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_DB: edmp_test
      POSTGRES_USER: edmp
      POSTGRES_PASSWORD: edmp
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt
      - name: Run tests
        run: |
          cd backend
          pytest -q
