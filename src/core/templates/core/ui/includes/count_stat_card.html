<section class="stat-card card">
  <h3>{{ card_title }}</h3>
  <div class="metric-list">
    <div class="metric-row"><span class="chip">{{ count_label }}</span><strong>{{ count_value }}</strong></div>
  </div>
  {% if link_href %}
  <p><a href="{{ link_href }}">{{ link_label }} →</a></p>
  {% endif %}
</section>
