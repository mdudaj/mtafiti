nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/mdudaj/mtafiti-backend
  tag: latest
  pullPolicy: IfNotPresent

secrets:
  name: mtafiti-backend-secrets
  celeryBrokerUrlKey: CELERY_BROKER_URL
  rabbitmqUrlKey: RABBITMQ_URL

postgres:
  enabled: true
  serviceName: postgres
  database: mtafiti
  user: mtafiti
  port: 5432
  image: postgres:16.11
  storage:
    size: 10Gi

rabbitmq:
  enabled: true
  serviceName: rabbitmq
  port: 5672
  image: rabbitmq:3.13.7

backend:
  enabled: true
  replicas: 1
  servicePort: 80
  containerPort: 8000

worker:
  enabled: true
  replicas: 1
  command:
    - celery
    - -A
    - config
    - worker
    - -l
    - INFO

migrationJob:
  enabled: true
  backoffLimit: 3

ingress:
  enabled: true
  className: ""
  controlPlaneHost: control.example.com
  tenantWildcardHost: "*.tenant.example.com"

security:
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  networkPolicy:
    enabled: true
    ingressNamespaceSelector:
      key: kubernetes.io/metadata.name
      value: ingress-nginx

platformServices:
  redis:
    enabled: false
    endpoint: redis://redis:6379/0
  minio:
    enabled: false
    endpoint: http://minio:9000
  keycloak:
    enabled: false
    issuerUrl: http://keycloak:8080/realms/mtafiti
  onlyoffice:
    enabled: false
    endpoint: http://onlyoffice:80
  jupyterhub:
    enabled: false
    endpoint: http://jupyterhub:80
  prometheus:
    enabled: false
    endpoint: http://prometheus:9090
  grafana:
    enabled: false
    endpoint: http://grafana:3000
  loki:
    enabled: false
    endpoint: http://loki:3100
  sentry:
    enabled: false
    dsn: ""
