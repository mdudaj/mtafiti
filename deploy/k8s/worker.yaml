apiVersion: apps/v1
kind: Deployment
metadata:
  name: edmp-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edmp-worker
  template:
    metadata:
      labels:
        app: edmp-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/mdudaj/edmp-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "config", "worker", "-l", "INFO"]
          env:
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: edmp-backend-secrets
                  key: DJANGO_SECRET_KEY
            - name: POSTGRES_DB
              value: edmp
            - name: POSTGRES_USER
              value: edmp
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: edmp-backend-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: CELERY_BROKER_URL
              value: amqp://guest:guest@rabbitmq:5672//
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672//
