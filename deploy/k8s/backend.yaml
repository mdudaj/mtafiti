apiVersion: apps/v1
kind: Deployment
metadata:
  name: edmp-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edmp-backend
  template:
    metadata:
      labels:
        app: edmp-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/mdudaj/edmp-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: edmp-backend-secrets
                  key: DJANGO_SECRET_KEY
            - name: POSTGRES_DB
              value: edmp
            - name: POSTGRES_USER
              value: edmp
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: edmp-backend-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: CELERY_BROKER_URL
              value: amqp://guest:guest@rabbitmq:5672//
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672//
          livenessProbe:
            httpGet:
              path: /livez
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: edmp-backend
spec:
  selector:
    app: edmp-backend
  ports:
    - name: http
      port: 80
      targetPort: 8000
