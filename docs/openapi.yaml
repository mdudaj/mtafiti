  components:
  parameters:
    XCorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
      description: Optional correlation ID. If not provided, the server generates one.
    XUserId:
      name: X-User-Id
      in: header
      required: false
      schema:
        type: string
      description: Optional user identifier for audit/event metadata (scaffold).
    XUserRoles:
      name: X-User-Roles
      in: header
      required: false
      schema:
        type: string
      description: Optional comma-separated roles (e.g. `catalog.editor,tenant.admin`).
  headers:
    XCorrelationId:
      schema:
        type: string
      description: Correlation ID for the request/response.
  schemas:
    ProbeOk:
      type: object
      properties:
        status:
          type: string
          example: ok
      required: [status]
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]
    Tenant:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        schema_name:
          type: string
          example: t_ab12cd34
        name:
          type: string
          example: Tenant A
        created_on:
          type: string
          format: date
        domains:
          type: array
          items:
            type: string
          example: [tenant-a.example.com]
      required: [id, schema_name, name, created_on, domains]
    CreateTenantRequest:
      type: object
      properties:
        name:
          type: string
        domain:
          type: string
          description: Primary tenant domain (hostname or URL; normalized server-side).
        schema_name:
          type: string
          description: Optional explicit schema name (defaults to `t_<random>`).
      required: [name, domain]
    DataAsset:
      type: object
      properties:
        id:
          type: string
          format: uuid
        qualified_name:
          type: string
          example: warehouse.sales.orders
        display_name:
          type: string
          example: Orders
        asset_type:
          type: string
          example: table
        description:
          type: string
          nullable: true
        owner:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        classifications:
          type: array
          items:
            type: string
        properties:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, qualified_name, display_name, asset_type, tags, classifications, properties, created_at, updated_at]
    CreateAssetRequest:
      type: object
      properties:
        qualified_name:
          type: string
        display_name:
          type: string
        asset_type:
          type: string
        description:
          type: string
          nullable: true
        owner:
          type: string
          nullable: true
        tags:
          type: array
          nullable: true
          items:
            type: string
        classifications:
          type: array
          nullable: true
          items:
            type: string
        properties:
          type: object
          additionalProperties: true
      required: [qualified_name, asset_type]
    UpdateAssetRequest:
      type: object
      properties:
        display_name:
          type: string
          nullable: true
        asset_type:
          type: string
          description: Present but immutable; changing it results in 400.
        properties:
          type: object
          nullable: true
          additionalProperties: true
        description:
          type: string
          nullable: true
        owner:
          type: string
          nullable: true
        tags:
          type: array
          nullable: true
          items:
            type: string
        classifications:
          type: array
          nullable: true
          items:
            type: string
    IngestionRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        connector:
          type: string
          example: dbt
        source:
          type: object
          additionalProperties: true
        mode:
          type: string
          nullable: true
          example: snapshot
        status:
          type: string
          example: queued
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, connector, source, status, created_at, updated_at]
    CreateIngestionRequest:
      type: object
      properties:
        connector:
          type: string
        project_id:
          type: string
          format: uuid
        source:
          type: object
          additionalProperties: true
        mode:
          type: string
      required: [connector, source]
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
          nullable: true
        institution_ref:
          type: string
          nullable: true
        status:
          type: string
          example: active
        sync_config:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, name, status, sync_config, created_at, updated_at]
    CreateProjectRequest:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        institution_ref:
          type: string
        status:
          type: string
        sync_config:
          type: object
          additionalProperties: true
      required: [name]
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        display_name:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, invited, disabled]
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, email, status, created_at, updated_at]
    UserProfileListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserProfile'
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
      required: [items, page, page_size, total]
    CreateUserProfileRequest:
      type: object
      properties:
        email:
          type: string
        display_name:
          type: string
        status:
          type: string
          enum: [active, invited, disabled]
      required: [email]
    UpdateUserProfileRequest:
      type: object
      properties:
        display_name:
          type: string
        status:
          type: string
          enum: [active, invited, disabled]
    ProjectMembership:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: integer
        user_email:
          type: string
        role:
          type: string
          enum: [principal_investigator, researcher, data_manager]
        status:
          type: string
          enum: [active, inactive]
        invited_by:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, project_id, user_email, role, status, created_at, updated_at]
    ProjectWorkspace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: integer
        collaboration_enabled:
          type: boolean
        data_management_enabled:
          type: boolean
        document_management_enabled:
          type: boolean
        collaboration_tools:
          type: array
          items:
            oneOf:
              - type: string
              - type: object
                additionalProperties: true
        data_resources:
          type: array
          items:
            type: object
            additionalProperties: true
        documents:
          type: array
          items:
            type: object
            additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        [
          id,
          project_id,
          collaboration_enabled,
          data_management_enabled,
          document_management_enabled,
          collaboration_tools,
          data_resources,
          documents,
          created_at,
          updated_at,
        ]
    UpdateProjectWorkspaceRequest:
      type: object
      properties:
        collaboration_enabled:
          type: boolean
        data_management_enabled:
          type: boolean
        document_management_enabled:
          type: boolean
        collaboration_tools:
          type: array
          items:
            oneOf:
              - type: string
              - type: object
                additionalProperties: true
        data_resources:
          type: array
          items:
            type: object
            additionalProperties: true
        documents:
          type: array
          items:
            type: object
            additionalProperties: true
    ProjectMembershipListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProjectMembership'
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
      required: [items, page, page_size, total]
    ProjectMembershipRoleHistory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        membership_id:
          type: string
          format: uuid
        action:
          type: string
        previous_role:
          type: string
          nullable: true
        new_role:
          type: string
          nullable: true
        previous_status:
          type: string
          nullable: true
        new_status:
          type: string
          nullable: true
        actor_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
      required: [id, membership_id, action, created_at]
    ProjectInvitation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: integer
        email:
          type: string
        role:
          type: string
          enum: [principal_investigator, researcher, data_manager]
        status:
          type: string
          enum: [pending, accepted, expired, revoked]
        token_attempts:
          type: integer
        max_token_attempts:
          type: integer
        expires_at:
          type: string
          format: date-time
        accepted_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        resent_at:
          type: string
          format: date-time
          nullable: true
        invited_by:
          type: string
          nullable: true
        accepted_by:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, project_id, email, role, status, token_attempts, max_token_attempts, expires_at, created_at, updated_at]
    InviteProjectMemberRequest:
      type: object
      properties:
        email:
          type: string
        role:
          type: string
          enum: [principal_investigator, researcher, data_manager]
      required: [email, role]
    ProjectMembershipLifecycleRequest:
      type: object
      properties:
        action:
          type: string
          enum: [change_role, revoke, reactivate]
        role:
          type: string
          enum: [principal_investigator, researcher, data_manager]
      required: [action]
    AcceptProjectInvitationRequest:
      type: object
      properties:
        token:
          type: string
        user_id:
          type: string
      required: [token]
    UserNotification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_email:
          type: string
        notification_type:
          type: string
        channel:
          type: string
          enum: [in_app, email, webhook]
        provider:
          type: string
        delivery_status:
          type: string
          enum: [pending, sent, failed, dead_letter]
        attempts:
          type: integer
        max_attempts:
          type: integer
        next_attempt_at:
          type: string
          format: date-time
          nullable: true
        delivered_at:
          type: string
          format: date-time
          nullable: true
