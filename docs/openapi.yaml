openapi: 3.0.3
info:
  title: EDMP HTTP API (scaffold)
  version: 0.1.0
  description: |
    This is a lightweight OpenAPI description of the current EDMP backend scaffold.

    **Multi-tenancy note**: Tenant-scoped endpoints (e.g. `/api/v1/assets`) are resolved by the request `Host`
    header via `EDMPTenantMiddleware`. Control-plane endpoints (e.g. `/api/v1/tenants`) bypass tenant resolution.
servers:
  - url: http://localhost:8000
tags:
  - name: probes
  - name: tenants
  - name: assets
  - name: ingestions
  - name: lineage
  - name: projects
  - name: stewardship
  - name: orchestration
  - name: agent
  - name: ui-operations
paths:
  /healthz:
    get:
      tags: [probes]
      summary: Health probe (no tenant required)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeOk'
  /livez:
    get:
      tags: [probes]
      summary: Liveness probe (no tenant required)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeOk'
  /readyz:
    get:
      tags: [probes]
      summary: Readiness probe (no tenant required; checks DB connectivity)
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbeOk'
        '503':
          description: Not ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: not-ready
  /api/v1/tenants:
    get:
      tags: [tenants]
      summary: List tenants (control plane)
      responses:
        '200':
          description: Tenant list
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tenant'
                required: [items]
    post:
      tags: [tenants]
      summary: Create a tenant (control plane)
      parameters:
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserRoles'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
      responses:
        '201':
          description: Tenant created
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflict (duplicate)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden (missing required role when role enforcement is enabled)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/assets:
    get:
      tags: [assets]
      summary: List assets (tenant-scoped)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Asset list
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/DataAsset'
                required: [items]
        '400':
          description: Invalid pagination params
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [assets]
      summary: Create an asset (tenant-scoped)
      parameters:
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserRoles'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssetRequest'
      responses:
        '201':
          description: Asset created
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataAsset'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden (missing required role when role enforcement is enabled)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/assets/{asset_id}:
    parameters:
      - name: asset_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [assets]
      summary: Get an asset (tenant-scoped)
      responses:
        '200':
          description: Asset
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataAsset'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags: [assets]
      summary: Update an asset (tenant-scoped)
      parameters:
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserRoles'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAssetRequest'
      responses:
        '200':
          description: Updated asset
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataAsset'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden (missing required role when role enforcement is enabled)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/ingestions:
    post:
      tags: [ingestions]
      summary: Create an ingestion request (tenant-scoped)
      parameters:
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserRoles'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIngestionRequest'
      responses:
        '201':
          description: Ingestion request created
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionRequest'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden (missing required role when role enforcement is enabled)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/ingestions/{ingestion_id}:
    parameters:
      - name: ingestion_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [ingestions]
      summary: Get ingestion request status (tenant-scoped)
      responses:
        '200':
          description: Ingestion request
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionRequest'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/lineage/edges:
    get:
      tags: [lineage]
      summary: Query lineage edges (tenant-scoped)
      parameters:
        - name: asset_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: direction
          in: query
          required: false
          schema:
            type: string
            default: downstream
            enum: [upstream, downstream]
        - name: depth
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
            maximum: 5
      responses:
        '200':
          description: Lineage query response
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LineageQueryResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Asset not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [lineage]
      summary: Upsert lineage edges (tenant-scoped)
      parameters:
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserRoles'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertLineageEdgesRequest'
      responses:
        '200':
          description: Edges upserted
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpsertLineageEdgesResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Referenced asset not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden (missing required role when role enforcement is enabled)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/projects:
    get:
      tags: [projects]
      summary: List projects (tenant-scoped)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Project list
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                required: [items]
    post:
      tags: [projects]
      summary: Create project (tenant-scoped)
      parameters:
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserRoles'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/stewardship/items:
    get:
      tags: [stewardship]
      summary: List stewardship items (tenant-scoped)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, in_review, blocked, resolved, dismissed]
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum: [low, medium, high, critical]
        - name: item_type
          in: query
          required: false
          schema:
            type: string
            enum: [quality_issue, privacy_request, access_review, policy_exception]
        - name: assignee
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Stewardship items
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/StewardshipItem'
                required: [items]
    post:
      tags: [stewardship]
      summary: Create a stewardship item (tenant-scoped)
      parameters:
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserRoles'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStewardshipItemRequest'
      responses:
        '201':
          description: Stewardship item created
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StewardshipItem'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/stewardship/items/{item_id}/transition:
    post:
      tags: [stewardship]
      summary: Transition a stewardship item (tenant-scoped)
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserRoles'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StewardshipTransitionRequest'
      responses:
        '200':
          description: Stewardship item transitioned
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StewardshipItem'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/orchestration/workflows:
    get:
      tags: [orchestration]
      summary: List orchestration workflows (tenant-scoped)
      parameters:
        - name: project_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, disabled]
        - name: trigger_type
          in: query
          required: false
          schema:
            type: string
            enum: [event, schedule, manual]
      responses:
        '200':
          description: Orchestration workflow list
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrchestrationWorkflow'
                required: [items]
    post:
      tags: [orchestration]
      summary: Create orchestration workflow (tenant-scoped)
      parameters:
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserRoles'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrchestrationWorkflowRequest'
      responses:
        '201':
          description: Orchestration workflow created
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrchestrationWorkflow'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Referenced project or ingestion not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/orchestration/runs:
    get:
      tags: [orchestration]
      summary: List orchestration runs (tenant-scoped)
      parameters:
        - name: project_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: workflow_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [queued, running, succeeded, failed, cancelled]
      responses:
        '200':
          description: Orchestration run list
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrchestrationRun'
                required: [items]
    post:
      tags: [orchestration]
      summary: Queue orchestration run (tenant-scoped)
      parameters:
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserRoles'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrchestrationRunRequest'
      responses:
        '201':
          description: Orchestration run queued
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrchestrationRun'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Referenced workflow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/orchestration/runs/{run_id}/transition:
    post:
      tags: [orchestration]
      summary: Transition orchestration run (start or cancel)
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserRoles'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrchestrationRunTransitionRequest'
      responses:
        '200':
          description: Orchestration run transitioned
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrchestrationRun'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/agent/runs:
    get:
      tags: [agent]
      summary: List agent runs (tenant-scoped)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [queued, running, completed, failed, cancelled, timed_out]
      responses:
        '200':
          description: Agent runs
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentRun'
                required: [items]
    post:
      tags: [agent]
      summary: Create an agent run (tenant-scoped)
      parameters:
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserRoles'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentRunRequest'
      responses:
        '201':
          description: Agent run created
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRun'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/agent/runs/{run_id}/transition:
    post:
      tags: [agent]
      summary: Transition an agent run
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserRoles'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRunTransitionRequest'
      responses:
        '200':
          description: Agent run transitioned
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/XCorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRun'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/users:
    get:
      tags: [projects]
      summary: List user profiles (tenant-scoped)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, invited, disabled]
        - name: email
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: User profile list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileListResponse'
    post:
      tags: [projects]
      summary: Create user profile (tenant-scoped)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserProfileRequest'
      responses:
        '201':
          description: User profile created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
